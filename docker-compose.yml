services:
  postgres:
    image: postgres:16-alpine
    container_name: collabpad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - collabpad-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collabpad"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: collabpad-redis
    restart: unless-stopped
    profiles:
      - phase4
    ports:
      - "6379:6379"
    volumes:
      - collabpad-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  collabpad-postgres-data:
  collabpad-redis-data:

